name: Daily Main Run

on:
  workflow_dispatch:
  schedule:
    # 00:30 UTC = 06:00 AM IST
    - cron: "30 0 * * *"
    # 07:30 UTC = 01:00 PM IST
    - cron: "30 7 * * *"

permissions:
  contents: write

jobs:
  run-main:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWS_ENRICHMENT_MODE: ${{ secrets.NEWS_ENRICHMENT_MODE }}
          KOREAN_NEWS_ENRICHMENT_MODE: ${{ secrets.KOREAN_NEWS_ENRICHMENT_MODE }}
        run: python main.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results.json results_enriched.json korean_results.json korean_results_enriched.json clinical_trials_hybrid_fixed.json ctri_trials.json clinical_trials_ctri.json clinical_trials_eu.json eu_ctis_trials.json investor_results.json alvotech_events.json biocon_earnings.json celltrion_earnings.json drreddys_quarterly_results.json fresenius_investor_news.json samsung_biologics_notices.json teva_pharma_events.json google_news_results.json jamp_news.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update tracker data"
            git push
          fi
